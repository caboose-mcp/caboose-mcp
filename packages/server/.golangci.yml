linters:
  enable:
    - govet
    - staticcheck
    - gosimple
    - unused
    - ineffassign
    - typecheck
  disable:
    - errcheck  # too many pre-existing unchecked returns; enable incrementally

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment  # not worth restructuring existing structs

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
