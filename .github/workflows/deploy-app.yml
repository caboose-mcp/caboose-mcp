# deploy-app.yml — build image, push to ECR, redeploy the MCP HTTP serve service
#
# Triggers:
#   - manual (workflow_dispatch)
#   - push to main that touches packages/server/**
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID      — IAM user with ECR push + ECS update permissions
#   AWS_SECRET_ACCESS_KEY

name: Deploy App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/server/**"
      - "docker/Dockerfile"

jobs:
  deploy:
    name: Build & Deploy App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/fafb:latest
        run: |
          docker build -f docker/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Index in Greptile (async)
        env:
          GREPTILE_API_KEY: ${{ secrets.GREPTILE_API_KEY }}
        run: |
          [ -n "$GREPTILE_API_KEY" ] || exit 0
          curl -s -X POST https://api.greptile.com/v2/repositories \
            -H "Authorization: Bearer $GREPTILE_API_KEY" \
            -H "X-Github-Token: ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"remote\":\"github\",\"repository\":\"${{ github.repository }}\",\"branch\":\"main\"}" \
            || true

      - name: Force new serve deployment
        run: |
          aws ecs update-service \
            --cluster fafb \
            --service fafb-serve \
            --force-new-deployment

      - name: Wait for serve service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster fafb \
            --services fafb-serve
