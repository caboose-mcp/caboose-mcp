# docker.yml — builds and pushes the MCP server Docker image to GHCR
#
# Triggers:
#   - push to main                 → tag: ghcr.io/fafb/fafb:latest
#   - push of tag server/v*        → tag: ghcr.io/fafb/fafb:<version>
#
# The image is built for linux/amd64 and linux/arm64 (Raspberry Pi compatible).
#
# Required secrets (set in repo Settings → Secrets):
#   GITHUB_TOKEN  — automatically provided, used for GHCR push

name: Docker

on:
  push:
    branches: [main]
    tags: ["server/v*"]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (cross-compile arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fafb/fafb
          tags: |
            # main branch → :latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # server/v1.2.3 tag → :1.2.3
            type=match,pattern=server/v(.*),group=1
            # always tag the short SHA
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
