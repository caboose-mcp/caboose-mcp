# notify-ui.yml — fires a repository_dispatch to caboose-mcp/ui on every push to main.
#
# The UI repo's update-pr.yml workflow listens for the "caboose-mcp-updated" event,
# clones this repo at the provided SHA, regenerates changelog.json, and opens a PR.
#
# Required GitHub secret:
#   UI_DISPATCH_TOKEN — fine-grained PAT with Contents: write + Actions: write
#                       scoped to caboose-mcp/ui

name: Notify UI

on:
  push:
    branches: [main]

jobs:
  dispatch:
    name: Trigger UI update PR
    runs-on: ubuntu-latest

    steps:
      - name: Send repository_dispatch to caboose-mcp/ui
        env:
          TOKEN: ${{ secrets.UI_DISPATCH_TOKEN }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/caboose-mcp/ui/dispatches \
            -d "{
              \"event_type\": \"caboose-mcp-updated\",
              \"client_payload\": {
                \"sha\": \"${{ github.sha }}\",
                \"ref\": \"${{ github.ref_name }}\",
                \"message\": $(echo '${{ github.event.head_commit.message }}' | python3 -c \"import sys,json; print(json.dumps(sys.stdin.read().strip()))\")
              }
            }"
