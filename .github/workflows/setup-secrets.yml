# setup-secrets.yml — Sync GitHub secrets to AWS Secrets Manager
#
# This workflow ensures that all runtime secrets (API keys, tokens) are
# properly configured in AWS Secrets Manager for ECS deployments.
#
# Trigger:
#   - Manual (workflow_dispatch)
#   - Push to main (on-demand by adding [setup-secrets] to commit message)
#
# GitHub Secrets Required:
#   ANTHROPIC_API_KEY        — Claude API key from console.anthropic.com
#   DISCORD_TOKEN            — Discord bot token
#   SLACK_TOKEN              — Slack bot token
#   SLACK_APP_TOKEN          — Slack App token (xapp-...)
#   AWS_ACCESS_KEY_ID        — IAM user with secretsmanager permissions
#   AWS_SECRET_ACCESS_KEY

name: Setup AWS Secrets

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: "Which environment to update"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

  push:
    branches: [main]

jobs:
  setup-secrets:
    name: Sync Secrets to AWS
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[setup-secrets]') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update AWS Secrets Manager
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          # Create or update the secret
          aws secretsmanager put-secret-value \
            --secret-id fafb/env \
            --secret-string '{
              "ANTHROPIC_API_KEY": "'$ANTHROPIC_API_KEY'",
              "SLACK_TOKEN": "'$SLACK_TOKEN'",
              "SLACK_APP_TOKEN": "'$SLACK_APP_TOKEN'",
              "DISCORD_TOKEN": "'$DISCORD_TOKEN'"
            }' \
            --region us-east-1

      - name: Verify secret was created/updated
        run: |
          aws secretsmanager describe-secret \
            --secret-id fafb/env \
            --region us-east-1

      - name: (Optional) Force new bots deployment
        if: github.event_name == 'workflow_dispatch'
        run: |
          aws ecs update-service \
            --cluster fafb \
            --service fafb-bots \
            --force-new-deployment \
            --region us-east-1
          echo "Triggered bots service redeployment"

      - name: Notify on success
        run: |
          echo "✓ AWS Secrets updated successfully"
          echo "Secrets updated in: us-east-1"
          echo "Secret name: fafb/env"
