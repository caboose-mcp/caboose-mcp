name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.2'

      - name: Run GoSec
        uses: securego/gosec@master
        with:
          args: '-fmt sarif -out results.sarif ./packages/server/...'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: results.sarif
          category: gosec

  npm-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --prod
        continue-on-error: true

      - name: Report audit results
        run: pnpm audit --json > npm-audit-results.json || true

      - name: Comment on PR with audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('npm-audit-results.json', 'utf8'));
            const vulnerabilities = audit.metadata?.vulnerabilities || {};

            if (vulnerabilities.critical || vulnerabilities.high) {
              core.setFailed(`npm audit found ${vulnerabilities.critical || 0} critical and ${vulnerabilities.high || 0} high vulnerabilities`);
            }

  trivy:
    name: Trivy Vulnerability Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --json --timeout=10s
        continue-on-error: true

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.2'

      - name: Check Go module licenses
        run: |
          # Check go.mod for GPL or copyleft licenses
          if [ -f packages/server/go.mod ]; then
            echo "Checking Go dependencies..."
            cd packages/server
            go list -m all | grep -E 'GPL|AGPL|SSPL' && echo "⚠️ Copyleft dependencies detected" || echo "✓ No detected copyleft dependencies"
          fi

  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [gosec, npm-audit, trivy, secret-scan]
    if: always()
    steps:
      - name: Check if any security job failed
        run: |
          if [ "${{ needs.gosec.result }}" == "failure" ] || \
             [ "${{ needs.npm-audit.result }}" == "failure" ] || \
             [ "${{ needs.trivy.result }}" == "failure" ] || \
             [ "${{ needs.secret-scan.result }}" == "failure" ]; then
            echo "❌ Security scan detected issues!"
            exit 1
          else
            echo "✅ All security scans passed!"
          fi

      - name: Report to Slack (on failure)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 fafb Security Scan Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
