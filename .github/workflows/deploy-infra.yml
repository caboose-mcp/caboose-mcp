# deploy-infra.yml — apply Terraform changes to AWS
#
# Triggers:
#   - manual (workflow_dispatch)
#   - push to main that touches terraform/aws/**
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID             — IAM user with Terraform permissions
#   AWS_SECRET_ACCESS_KEY
#   TF_VAR_CLOUDSYNC_BUCKET_NAME  — globally unique S3 bucket name
#   TF_VAR_ROUTE53_ZONE_ID        — Route53 zone ID (leave empty if not using Route53)
#   TF_VAR_GITHUB_ORGS            — comma-separated GitHub org names (default: caboose-mcp)
#   TF_VAR_DISCORD_BOT_CHANNELS   — comma-separated Discord channel IDs
#   TF_VAR_SLACK_BOT_CHANNELS     — comma-separated Slack channel IDs (optional)
#
# App secrets pushed to Secrets Manager (fafb/env):
#   SECRET_ANTHROPIC_API_KEY
#   SECRET_SLACK_TOKEN
#   SECRET_SLACK_APP_TOKEN
#   SECRET_DISCORD_TOKEN

name: Deploy Infra

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "terraform/aws/**"

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/aws

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~> 1.6"

      - name: Terraform Init
        run: tofu init

      - name: Sync secrets to AWS Secrets Manager
        run: |
          aws secretsmanager create-secret \
            --name fafb/env \
            --description "fafb runtime secrets" 2>/dev/null || true
          aws secretsmanager put-secret-value \
            --secret-id fafb/env \
            --secret-string "{
              \"ANTHROPIC_API_KEY\": \"${{ secrets.SECRET_ANTHROPIC_API_KEY }}\",
              \"SLACK_TOKEN\": \"${{ secrets.SECRET_SLACK_TOKEN }}\",
              \"SLACK_APP_TOKEN\": \"${{ secrets.SECRET_SLACK_APP_TOKEN }}\",
              \"DISCORD_TOKEN\": \"${{ secrets.SECRET_DISCORD_TOKEN }}\"
            }"

      - name: Terraform Plan
        run: tofu plan -out=tfplan
        env:
          TF_VAR_cloudsync_bucket_name: ${{ secrets.TF_VAR_CLOUDSYNC_BUCKET_NAME }}
          TF_VAR_route53_zone_id: ${{ secrets.TF_VAR_ROUTE53_ZONE_ID }}
          TF_VAR_github_orgs: ${{ secrets.TF_VAR_GITHUB_ORGS }}
          TF_VAR_slack_bot_channels: ${{ secrets.TF_VAR_SLACK_BOT_CHANNELS }}
          TF_VAR_discord_bot_channels: ${{ secrets.TF_VAR_DISCORD_BOT_CHANNELS }}

      - name: Terraform Apply
        run: tofu apply -auto-approve tfplan
